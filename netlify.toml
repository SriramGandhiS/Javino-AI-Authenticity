[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = ".next"
  ignore = "git diff --name-only HEAD^ HEAD | grep -qvE '^(TODO\\.md|BUGS\\.md|testing-notes\\.txt|future-updates\\.md|dev-notes\\.md|\\.github/workflows/)' && exit 1 || exit 0"

[[plugins]]
  package = "@netlify/plugin-nextjs"
